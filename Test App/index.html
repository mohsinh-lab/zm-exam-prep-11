<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AcePrep" />
  <link rel="icon" type="image/png" href="/zm-exam-prep-11/icon-512.png" />
  <link rel="apple-touch-icon" href="/zm-exam-prep-11/icon-192.png" />
  <link rel="manifest" href="/zm-exam-prep-11/manifest.json" />
  <title>AcePrep 11+ | Dream School</title>
  <meta name="description"
    content="Smart 11+ GL Assessment preparation app for 9-12 year olds. Targeted for Dream School." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  
  <!-- Critical Asset Preload -->
  <link rel="preload" as="image" href="ace-mascot.png" />
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <main id="app">
    <div id="main-content"></div>
    <div id="splash" class="splash-screen">
      <div class="splash-logo">
        <div class="splash-icon">🎓</div>
        <h1>AcePrep 11+</h1>
        <p>Dream School Prep</p>
      </div>
      <div class="splash-loader" id="splash-loader">
        <div class="loader-bar">
          <div class="loader-fill"></div>
        </div>
        <span id="splash-status" aria-live="polite">Loading your learning journey...</span>
      </div>
      <!-- Production Safety Net Fallback -->
      <div id="boot-error" style="display:none; text-align:center; padding: 20px; font-family: 'Nunito', sans-serif;">
        <p style="color: #ff6b6b; font-weight: 800; font-size: 1.2rem; margin-bottom: 10px;">Oops! Boot error.</p>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">The app is taking longer than expected to load.
        </p>
        <button onclick="location.reload()"
          style="background: #4a90e2; color: white; border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 800; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">Retry
          Now</button>
        <p style="font-size: 0.7rem; color: #aaa; margin-top: 20px;" id="error-details"></p>
      </div>
    </div>
  </main>
  <script>
    // --- Production Safety Net ---
    window.__BOOT_TIMEOUT__ = setTimeout(function () {
      if (!window.__APP_BOOTED__) {
        console.error('App boot timed out after 15s');
        const loader = document.getElementById('splash-loader');
        const error = document.getElementById('boot-error');
        const details = document.getElementById('error-details');
        if (loader) loader.style.display = 'none';
        if (error) error.style.display = 'block';
        if (details) details.innerText = 'Timeout: Possible network or script error.';
      }
    }, 15000);

    window.onerror = function (msg, url, lineNo, columnNo, error) {
      if (!window.__APP_BOOTED__) {
        const loader = document.getElementById('splash-loader');
        const errorDiv = document.getElementById('boot-error');
        const details = document.getElementById('error-details');
        if (loader) loader.style.display = 'none';
        if (errorDiv) errorDiv.style.display = 'block';
        if (details) details.innerText = 'Error: ' + msg + (lineNo ? ' (Line: ' + lineNo + ')' : '');
      }
      return false;
    };
  </script>
  <script type="module" src="src/app.js"></script>
</body>

</html>
