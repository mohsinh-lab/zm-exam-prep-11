# Production-grade deployment pipeline for AcePrep 11+
# Phase 1: Test → Phase 2: Build → Phase 3: Smoke Test → Phase 4: Deploy
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Phase 1: Unit Tests ─────────────────────────────────────────────────────
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './Test App/package-lock.json'
      - name: Install dependencies
        working-directory: './Test App'
        run: npm ci
      - name: Run unit tests
        working-directory: './Test App'
        run: npm test
      - name: Check test results
        if: failure()
        run: echo "❌ Unit tests FAILED. Deploy aborted."

  # ── Phase 2: Build ──────────────────────────────────────────────────────────
  build:
    name: "🔨 Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './Test App/package-lock.json'
      - name: Install dependencies
        working-directory: './Test App'
        run: npm ci
      - name: Build for production
        working-directory: './Test App'
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build
      - name: Verify dist was created
        working-directory: './Test App'
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed: dist/index.html not found"
            exit 1
          fi
          echo "✅ Build output: $(du -sh dist)"
      - name: Smoke test — scan bundle for common errors
        working-directory: './Test App'
        run: |
          BUNDLE=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "❌ No bundle file found in dist/assets/"
            exit 1
          fi
          echo "📦 Checking bundle: $BUNDLE"
          # Fail if ReferenceError patterns are visible (uncaught variable refs)
          if grep -q 'ReferenceError' "$BUNDLE"; then
            echo "⚠️  Warning: ReferenceError string found in bundle"
          fi
          # Verify key exports are present in bundle
          if ! grep -q 'APP_BOOTED' "$BUNDLE"; then
            echo "❌ __APP_BOOTED__ marker not found — boot safety net may be missing"
            exit 1
          fi
          if ! grep -q 'AcePrep Boot Successful' "$BUNDLE"; then
            echo "❌ Boot success log not found in bundle"
            exit 1
          fi
          if ! grep -q 'onAuthStateChanged' "$BUNDLE"; then
            echo "❌ Firebase onAuthStateChanged is missing from bundle"
            exit 1
          fi
          echo "✅ Bundle smoke test passed"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Test App/dist'

  # ── Phase 3: Deploy (only on push to main) ──────────────────────────────────
  deploy:
    name: "🚀 Deploy to Pages"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
